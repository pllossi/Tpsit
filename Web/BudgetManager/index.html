<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <header class="custom-header-footer text-center py-3 mb-4">
        <h1>
            Budget Manager
        </h1>
    </header>
    <main class="container p-4 rounded shadow cont-princ">
        <form id="budgetForm">
            <div class="mb-3">
                <label for="nomeAttivita" class="form-label">Nome Attività</label>
                <input type="text" id="nomeAttivita" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="costoPrevisto" class="form-label">Costo Previsto (€)</label>
                <input type="number" id="costoPrevisto" class="form-control" min="0" step="0.01" required>
            </div>
            
            <div class="d-flex flex-column gap-2 mt-3">
                <button type="submit" id="inserisciTask" class="btn btn-primary w-100">Aggiungi</button>
                <div class="d-flex gap-2">
                    <button type="button" id="ordinaMenoCostosi" class="btn btn-light w-100 text-secondary">Meno costosi</button>
                    <button type="button" id="ordinaPiuCostosi" class="btn btn-light w-100 text-secondary">Più costosi</button>
                </div>
            </div>
        </form>

        <div class="mt-4">
            <h2>Task Aggiunti</h2>
            <ul id="taskList" class="list-group">
            </ul>
        </div>

        <div class="mt-4 border-top pt-3 text-end">
            <h3>Totale Spesa: <span id="totaleSpesa">0</span>€</h3>
        </div>
    </main>
    <footer>
        <div class="custom-header-footer text-center py-3 fixed-bottom">
            <p>Boschi Filippo - 2026</p>
        </div>
    </footer>
</body>

</html>
