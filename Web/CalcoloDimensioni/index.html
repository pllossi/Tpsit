<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolo di dimensioni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6mY5Y2Q7+Q2Y2bM3rZ5f6b8l1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1" crossorigin="anonymous">
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="index.css" type="text/css">
</head>
<body>
    <header>
        <h1>Calcolo di dimensioni</h1>
    </header>
    <main>
        <div class="container">
            <h1>
                Convertitore di dimensioni
            </h1>
            <form id="converterForm" novalidate>
                <div class="mb-3">
                    <label for="inputValue" class="form-label">Valore</label>
                    <input type="number" class="form-control" id="inputValue" placeholder="Inserisci valore">
                </div>
                <div class="mb-3">
                    <label for="inputUnit" class="form-label">Unità di misura</label>
                    <select class="form-select" id="inputUnit">
                        <option value="px">Pixel (px)</option>
                        <option value="rem">Rem (rem)</option>
                        <option value="cm">Centimetri (cm)</option>
                        <option value="mm">Millimetri (mm)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="outputUnit" class="form-label">Unità di destinazione</label>
                    <select class="form-select" id="outputUnit">
                        <option value="px">Pixel (px)</option>
                        <option value="rem">Rem (rem)</option>
                        <option value="cm">Centimetri (cm)</option>
                        <option value="mm">Millimetri (mm)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Converti</button>
            </form>

            <div id="result" class="mt-4" role="status" aria-live="polite">
                <div id="conversionOutput"></div>
             </div>
        </div>
    </main>
    <footer class="text-center py-3">
        <small>Calcolatore di dimensioni — semplice convertitore</small>
    </footer>
</body>
</html>
